name: native-kernel-parity

# Parity gate for the Rust type-kernel. Runs the full testcheck corpus
# with TEST_NATIVE_TYPE_KERNEL=1 and the Stage 3c resolvers installed.
# Resolver install lives in mypy/test/conftest.py, not in build.py.

# STATUS: non-gating. The join kernel (setops.rs) has ~173 pre-existing
# failures with resolvers installed (issue #70). Gating once #70 closes.

on:
  pull_request:
    branches: [main]
    paths:
      - crates/type_kernel/**
      - mypy/subtypes.py
      - mypy/join.py
      - mypy/argmap.py
      - mypy/erasetype.py
      - mypy/mro.py
      - mypy/build.py
      - mypy/test/conftest.py
      - .github/workflows/native-kernel-parity.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: native-kernel-parity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parity:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.14"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-parity-${{ runner.os }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: cargo-parity-${{ runner.os }}-

      - name: Sync Python deps (uv)
        run: uv sync --group test

      - name: Build type_kernel extension
        run: |
          SCRATCH=/tmp/type-kernel-ext
          mkdir -p "$SCRATCH"
          cargo rustc -p mypy-type-kernel --features extension-module \
            --lib --crate-type cdylib --release
          EXT_SUFFIX=$(uv run python -c "import sysconfig; print(sysconfig.get_config_var('EXT_SUFFIX'))")
          cp target/release/libtype_kernel.so "$SCRATCH/type_kernel${EXT_SUFFIX}"
          echo "SCRATCH=$SCRATCH" >> "$GITHUB_ENV"
          echo "EXT_SUFFIX=$EXT_SUFFIX" >> "$GITHUB_ENV"

      - name: Parity testcheck (resolvers installed)
        env:
          PYTHONPATH: ${{ env.SCRATCH }}
          TEST_NATIVE_TYPE_KERNEL: "1"
          MYPY_NATIVE_PARITY_INSTALL_RESOLVERS: "1"
        run: uv run python -m pytest mypy/test/testcheck.py -q -k "not slow"
